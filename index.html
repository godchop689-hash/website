<!DOCTYPE html>
<html lang="en">

<head>
    <title>Zthero | Home</title>
    <link rel="icon" type="image/x-icon" href="Thebest.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            /* Deep Space Gradient */
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            margin: 0;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        /* Glassmorphism Nav Bar */
        
        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        /* Neon Button Styles */
        
        .btn {
            text-decoration: none;
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 12px;
            color: white;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
        }
        /* Icon Spacing and Animation */
        
        .btn i {
            margin-right: 10px;
            font-size: 1rem;
            transition: 0.4s;
        }
        
        .home {
            background: #e94560;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
        }
        
        .about,
        .projects,
        .contact {
            background: #0f3460;
        }
        
        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            filter: brightness(1.3);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            background: #e94560;
        }
        /* Makes the icon spin on hover */
        
        .btn:hover i {
            transform: rotate(360deg);
        }
        /* Main Content Box */
        
        .container {
            padding: 50px 20px;
        }
        
        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ffffff, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            margin: 40px auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .yt-button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            font-size: 1.1rem;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }
        
        .yt-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" class="btn home">
            <i class="fas fa-home"></i> Home
        </a>
        <a href="about.html" class="btn about">
            <i class="fas fa-user"></i> About
        </a>
        <a href="projects.html" class="btn projects">
            <i class="fas fa-code"></i> Projects
        </a>
        <a href="contact.html" class="btn contact">
            <i class="fas fa-envelope"></i> Contact
        </a>
    </nav>

    <div class="container">
        <h1>Welcome to My Site</h1>
        <div class="card">
            <p style="font-size: 1.2rem; opacity: 0.8;">I wrote this website by hand.</p>
            <p>Want to get a Dev Account? Click the button below!</p>
            <br>
            <a href="https://www.youtube.com/watch?v=TTASakax8-w">
                <button class="yt-button"><i class="fab fa-youtube"></i> How To Get a Dev Account</button>
            </a>
        </div>
    </div>
</body>

</html>
