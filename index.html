<!DOCTYPE html>
<html lang="en">

<head>
    <title>Zthero | Home</title>
    <link rel="icon" type="image/x-icon" href="Thebest.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            margin: 0;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
        }
        
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
        }
        
        .btn {
            text-decoration: none;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            cursor: pointer;
            background: #0f3460;
        }
        
        .btn i {
            margin-right: 8px;
        }
        
        .home-active {
            background: #e94560 !important;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            background: #e94560;
        }
        /* Music Player Styling */
        
        .player-controls {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid #e94560;
            margin-left: 10px;
        }
        
        .play-btn {
            color: #e94560;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        
        .play-btn:hover {
            transform: scale(1.2);
        }
        
        #track-name {
            font-size: 0.7rem;
            font-weight: bold;
            min-width: 80px;
            color: #fff;
            text-transform: uppercase;
        }
        
        .container {
            padding: 50px 20px;
        }
        
        h1 {
            font-size: 3.5rem;
            background: linear-gradient(to right, #ffffff, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            margin: 40px auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .yt-button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="btn home-active"><i class="fas fa-home"></i> Home</a>
        <a href="about.html" class="btn"><i class="fas fa-user"></i> About</a>
        <a href="projects.html" class="btn"><i class="fas fa-code"></i> Projects</a>
        <a href="contact.html" class="btn"><i class="fas fa-envelope"></i> Contact</a>

        <div class="player-controls">
            <span id="track-name">Taste</span>
            <i class="fas fa-step-backward play-btn" onclick="prevTrack()"></i>
            <i id="masterPlay" class="fas fa-play play-btn" onclick="togglePlay()"></i>
            <i class="fas fa-step-forward play-btn" onclick="nextTrack()"></i>
        </div>
    </nav>

    <div class="container">
        <h1>Welcome to My Site</h1>
        <div class="card">
            <p style="font-size: 1.2rem; opacity: 0.8;">Custom WebSite Made By Zthero</p>
            <br>
            <a href="https://www.youtube.com/watch?v=TTASakax8-w"><button class="yt-button"><i class="fab fa-youtube"></i> Dev Account Guide</button></a>
        </div>
    </div>

    <audio id="mainAudio" src="Tyga - Taste (Official Video) ft. Offset.mp3"></audio>

    <script>
        const audio = document.getElementById("mainAudio");
        const playBtn = document.getElementById("masterPlay");
        const trackText = document.getElementById("track-name");

        // Playlist Array - Add more files here!
        const playlist = [{
            name: "Taste",
            file: "Tyga - Taste (Official Video) ft. Offset.mp3"
        }, {
            name: "Track 2",
            file: "track2.mp3"
        }];

        let currentTrack = 0;

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.classList.replace("fa-play", "fa-pause");
            } else {
                audio.pause();
                playBtn.classList.replace("fa-pause", "fa-play");
            }
        }

        function loadTrack(index) {
            currentTrack = index;
            audio.src = playlist[currentTrack].file;
            trackText.innerText = playlist[currentTrack].name;
            if (!audio.paused) audio.play();
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % playlist.length;
            loadTrack(currentTrack);
            audio.play();
            playBtn.classList.replace("fa-play", "fa-pause");
        }

        function prevTrack() {
            currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
            loadTrack(currentTrack);
            audio.play();
            playBtn.classList.replace("fa-play", "fa-pause");
        }
    </script>
</body>

</html>
